<section class="error-card" [class.error-card--compact]="compact()" role="alert" aria-live="polite">
  <span class="error-card__badge">Atención</span>
  <h2>{{ title() }}</h2>
  <p>{{ message() }}</p>

  <p *ngIf="technicalCode()" class="error-card__code">
    Código técnico: {{ technicalCode() }}
  </p>

  <button *ngIf="retryable()" type="button" class="error-card__action" (click)="onRetry()">
    {{ retryLabel() }}
  </button>
</section>
